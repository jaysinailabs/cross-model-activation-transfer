name: Artifact Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-artifact:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test runner
        run: python -m pip install --upgrade pip pytest

      - name: Rebuild clean eval and check frozen hash
        run: python -m pytest tests/test_h1_clean_eval_reproducible.py -q

      - name: Validate main final results
        run: python papers/h1_activation_transfer/scripts/validate_final_results.py

      - name: Validate strict matched controls
        run: >
          python papers/h1_activation_transfer/scripts/validate_final_results.py
          --results-dir
          papers/h1_activation_transfer/results/final
          papers/h1_activation_transfer/results/final_strict_controls
          --include-strict-matched
          --output-dir papers/h1_activation_transfer/results/final_with_strict_controls

      - name: Scan for local path leaks
        shell: python
        run: |
          from pathlib import Path
          import sys

          patterns = [
              "E:" + "/" + "MyAi" + "Projects",
              "E:" + "\\" + "MyAi" + "Projects",
              "MyAi" + "Projects",
              "C:" + "/" + "Users",
              "C:" + "\\" + "Users",
              "Users" + "\\" + "xin",
              "xinjing" + "shun",
              "pivini" + "sute",
              "file:" + "///",
          ]
          text_suffixes = {
              ".bib",
              ".cfg",
              ".csv",
              ".json",
              ".jsonl",
              ".md",
              ".py",
              ".tex",
              ".toml",
              ".txt",
              ".yaml",
              ".yml",
          }
          hits = []
          for path in Path(".").rglob("*"):
              if ".git" in path.parts or not path.is_file():
                  continue
              if path.suffix.lower() not in text_suffixes:
                  continue
              text = path.read_text(encoding="utf-8", errors="ignore")
              for pattern in patterns:
                  if pattern.lower() in text.lower():
                      hits.append(f"{path}: {pattern}")
          if hits:
              print("\n".join(hits))
              sys.exit(1)
